<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Etusivu | Terveyssovellus</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <load src="../partials/navbar.html"/>
    <!-- Pääsisältö -->
    <main class="page" id="main-content">
      <!-- Henkilökohtainen tervehdys -->
      <div class="greeting" id="greeting-block">
        <div class="greeting__text" id="greeting-text">Hei!</div>
        <div class="greeting__sub" id="greeting-sub">Ladataan tietoja…</div>
      </div>

      <!-- Mieliala-arviointi -->
      <section aria-labelledby="mood-heading" style="margin-bottom: 1.5rem">
        <h2 class="section-title" id="mood-heading">Päivän kuormitus</h2>
        <div class="card">
          <p class="form-label" style="margin-bottom: 0.75rem">
            Miten voit tänään? <span id="mood-value-label">–</span>
          </p>
          <input
            type="range"
            id="mood-slider"
            min="1"
            max="5"
            value="3"
            style="width: 100%; accent-color: var(--color-primary)"
            aria-label="Kuormitustaso 1–5"
          />
          <div
            style="
              display: flex;
              justify-content: space-between;
              font-size: 0.75rem;
              color: var(--color-text-secondary);
              margin-top: 0.4rem;
            "
          >
            <span>Erinomainen</span><span>Normaali</span
            ><span>Erittäin kuormittunut</span>
          </div>

          <!-- Päivittäinen viesti -->
          <div style="margin-top: 1.5rem">
            <label
              for="daily-log-message"
              class="form-label"
              style="display: block; margin-bottom: 0.5rem"
            >
              Päiväkirjamerkintä
            </label>
            <textarea
              id="daily-log-message"
              rows="4"
              placeholder="Kirjoita vapaasti..."
              style="
                width: 100%;
                padding: 0.75rem;
                border-radius: 8px;
                font-family: inherit;
                font-size: 0.9rem;
                resize: vertical;
                background-color: #d4deda;
                border: 2px solid #d0ddd8;
              "
            ></textarea>
          </div>

          <button
            class="btn btn--secondary btn--sm"
            id="save-mood-btn"
            style="margin-top: 1rem; width: auto"
          >
            Tallenna
          </button>
        </div>
      </section>

      <!-- HRV-yhteenveto (lyhyt) -->
      <section aria-labelledby="hrv-heading" style="margin-bottom: 1.5rem">
        <h2 class="section-title" id="hrv-heading">
          HRV-mittausten yhteenveto
        </h2>
        <div class="card-grid" id="hrv-cards">
          <!-- Kortit generoidaan JS:llä -->
          <div class="card">
            <div class="card__title">RMSSD</div>
            <div class="card__value" id="hrv-rmssd">–</div>
            <div class="card__label">ms</div>
          </div>
          <div class="card">
            <div class="card__title">LF/HF</div>
            <div class="card__value" id="hrv-lfhf">–</div>
            <div class="card__label">suhde</div>
          </div>
          <div class="card">
            <div class="card__title">Stressitaso</div>
            <div class="card__value" id="hrv-stress">–</div>
            <div class="card__label">/ 100</div>
          </div>
          <div class="card">
            <div class="card__title">Palautuminen</div>
            <div class="card__value" id="hrv-recovery">–</div>
            <div class="card__label">%</div>
          </div>
        </div>
        <div id="hrv-fetch-area">
          <button class="btn btn--secondary btn--sm" id="fetch-hrv-btn">
            Päivitä Kubioksesta
          </button>
          <span
            id="hrv-status"
            aria-live="polite"
            style="
              margin-left: 0.75rem;
              font-size: 0.85rem;
              color: var(--color-text-secondary);
            "
          ></span>
        </div>
      </section>

      <!-- Liikuntavinkit / suositukset -->
      <section aria-labelledby="reco-heading">
        <h2 class="section-title" id="reco-heading">
          Suositellut harjoitukset
        </h2>
        <div id="recommendations-list">
          <!-- Generoidaan JS:llä -->
          <div class="empty-state">
            <div class="empty-state__icon">🏃</div>
            <div class="empty-state__text">Ladataan suosituksia…</div>
          </div>
        </div>
      </section>
    </main>
    <load src="../partials/overlays.html"/>
    <script type="module" src="home.js"></script>
  </body>
</html>
