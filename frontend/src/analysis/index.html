<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analyysi | Terveyssovellus</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <load src="/src/partials/navbar.html" />

    <main class="page">
      <h1 class="section-title">Analyysi</h1>

      <div class="analysis-controls">
        <label for="time-range">Aikaväli:</label>
        <select id="time-range" class="time-range-select">
          <option value="week">Viikko</option>
          <option value="month">Kuukausi</option>
          <option value="all" selected>Kaikki</option>
        </select>
      </div>

      <div class="charts-container">
        <div class="chart-wrapper">
          <h2>RMSSD-aikasarja</h2>
          <canvas id="rmssd-chart"></canvas>
        </div>

        <div class="chart-wrapper">
          <h2>Stressitaso</h2>
          <canvas id="stress-chart"></canvas>
        </div>
      </div>
    </main>
    <load src="/src/partials/overlays.html" />

    <script type="module">
      import {requireAuth} from '../js/api.js';
      import {initLayout} from '../js/layout.js';
      import {init} from '../js/analysis.js';

      requireAuth();

      document.addEventListener('DOMContentLoaded', () => {
        initLayout();
        init();
      });
    </script>
  </body>
</html>
