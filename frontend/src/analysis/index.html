<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analyysi | Terveyssovellus</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/analysis.css" />
  </head>
  <body>
    <load src="/src/partials/navbar.html" />

    <main class="page">
      <h1 class="section-title">Analyysi</h1>

      <div class="analysis-controls">
        <label for="time-range">Aikaväli:</label>
        <select id="time-range" class="time-range-select">
          <option value="week">Viikko</option>
          <option value="month">Kuukausi</option>
          <option value="all" selected>Kaikki</option>
        </select>
      </div>

      <div class="charts-container">
        <div class="chart-wrapper">
          <h2>RMSSD-aikasarja</h2>
          <canvas id="rmssd-chart"></canvas>
        </div>
        <div class="chart-wrapper">
          <h2>Stressitaso</h2>
          <canvas id="stress-chart"></canvas>
        </div>
      </div>

      <div class="analysis-grid">
        <section class="card">
          <h2 class="section-title">Viikkoraportit</h2>
          <div id="weekly-reports-list">
            <!-- JS täyttää -->
          </div>
        </section>

        <section class="card">
          <h2 class="section-title">Omat merkinnät</h2>
          <div class="diary-list" id="diary-entries-list">
            <!-- JS täyttää -->
          </div>
        </section>
        <!-- USERS DIARY ENTRY EDITING OVERLAY -->

        <div id="edit-entry-modal" class="modal-overlay hidden">
          <div class="modal-content">
            <h3 style="margin-bottom: 1.5rem">Muokkaa merkintää</h3>

            <div class="form-group">
              <label for="edit-mood">Mieliala</label>
              <input type="range" id="edit-mood" min="1" max="5" step="1" />
              <div class="range-labels">
                <span>😄</span><span>🙂</span><span>😐</span><span>😔</span
                ><span>😟</span>
              </div>
            </div>

            <div class="form-group">
              <label for="edit-workload">Kuormitus (1-5)</label>
              <input type="range" id="edit-workload" min="1" max="5" step="1" />
            </div>

            <div class="form-group">
              <label for="edit-message">Vapaa sana</label>
              <textarea
                id="edit-message"
                rows="4"
                placeholder="Kirjoita mietteitäsi..."
              ></textarea>
            </div>

            <div class="modal-actions">
              <button id="cancel-edit-btn" class="btn btn-secondary">
                Peruuta
              </button>
              <button id="save-edit-btn" class="btn btn-primary">
                Tallenna muutokset
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <load src="/src/partials/overlays.html" />

    <script type="module">
      import {requireAuth} from '../js/api.js';
      import {initLayout} from '../js/layout.js';
      import {init} from '../js/analysis.js';
      import {loadWeeklyReports} from '../js/weekly-report.js';

      requireAuth();

      document.addEventListener('DOMContentLoaded', () => {
        initLayout();
        init();
        loadWeeklyReports();
      });
    </script>
  </body>
</html>
