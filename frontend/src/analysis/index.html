<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analyysi | Terveyssovellus</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <nav class="navbar">
      <a class="navbar__brand" href="/src/home/index.html">TUES</a>
      <div class="navbar__icons">
        <a class="navbar__btn" href="/src/home/index.html" aria-label="Etusivu">
          <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        </a>
        <a class="navbar__btn active" href="/src/analysis/index.html" aria-label="Analyysi">
          <svg viewBox="0 0 24 24"><path d="M3.5 18.5l6-6 4 4L22 6.92M21 21H3V3"/></svg>
        </a>
      </div>
    </nav>

    <main class="page">
      <h1 class="section-title">Analyysi</h1>

      <div class="analysis-controls">
        <label for="time-range">Aikaväli:</label>
        <select id="time-range" class="time-range-select">
          <option value="week">Viikko</option>
          <option value="month">Kuukausi</option>
          <option value="all" selected>Kaikki</option>
        </select>
      </div>

      <div class="charts-container">
        <div class="chart-wrapper">
          <h2>RMSSD-aikasarja</h2>
          <canvas id="rmssd-chart"></canvas>
        </div>

        <div class="chart-wrapper">
          <h2>Stressitaso</h2>
          <canvas id="stress-chart"></canvas>
        </div>
      </div>
    </main>

    <div id="snackbar"></div>
    <script type="module">
      import { requireAuth, applyTheme } from '../js/api.js';
      import { init } from '../js/analysis.js';
      applyTheme();
      requireAuth();
      init();
    </script>
  </body>
</html>
