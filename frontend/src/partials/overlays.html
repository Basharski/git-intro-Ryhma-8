<!-- Asetukset-overlay -->
<div
  class="overlay-backdrop"
  id="settings-overlay"
  role="dialog"
  aria-modal="true"
  aria-labelledby="settings-title"
>
  <div class="overlay-panel">
    <div class="overlay__header">
      <h2 class="overlay__title" id="settings-title">Asetukset</h2>
      <button
        class="overlay__close"
        id="close-settings"
        aria-label="Sulje asetukset"
        title="Sulje"
      >
        ✕
      </button>
    </div>

    <!-- Tumma/vaalea teema -->
    <div>
      <div class="toggle-row">
        <span class="toggle-label">Tumma teema</span>
        <label class="toggle-switch" aria-label="Vaihda tumma/vaalea teema">
          <input type="checkbox" id="theme-toggle" role="switch" />
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <!-- Ladattava formaatti -->
    <div>
      <p class="form-label" style="margin-bottom: 0.6rem">Latausformaatti</p>
      <div class="radio-group" id="download-format">
        <label class="radio-option">
          <input type="radio" name="format" value="csv" checked /> CSV
        </label>
        <label class="radio-option">
          <input type="radio" name="format" value="json" /> JSON
        </label>
        <label class="radio-option">
          <input type="radio" name="format" value="pdf" /> PDF
        </label>
      </div>
      <button
        class="btn btn--secondary btn--sm"
        id="download-btn"
        style="margin-top: 0.75rem"
      >
        Lataa data
      </button>
    </div>

    <!-- SHARE TO A PROFESSIONAL FIELD -->
    <div
      id="pro-link-section"
      style="
        margin-top: 1rem;
        padding-top: 1rem;
        border-top: 1px solid var(--color-border);
      "
    >
      <!-- STATE A: No link between user and professional -->
      <div id="pro-link-input-container">
        <p class="form-label" style="margin-bottom: 0.6rem">
          Jaa data asiantuntijalle
        </p>
        <div style="display: flex; gap: 0.5rem">
          <input
            type="text"
            id="invite-code-input"
            class="form-input"
            placeholder="Kutsuviite"
          />
          <button
            class="btn btn--primary"
            id="send-code-btn"
            style="width: auto"
          >
            Jaa
          </button>
        </div>
      </div>

      <!-- STATE B: Link found between user and professional -->
      <div id="pro-link-status-container" style="display: none">
        <p class="form-label" style="margin-bottom: 0.2rem">
          Aktiivinen yhteys
        </p>
        <p
          id="share-status"
          style="
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--color-primary);
            margin-bottom: 0.6rem;
          "
        ></p>
        <button
          class="btn btn--danger btn--sm"
          id="revoke-code-btn"
          style="width: auto"
        >
          Lopeta tietojen jako
        </button>
      </div>
    </div>

    <!-- Poista kaikki data -->
    <div style="margin-top: auto">
      <button class="btn btn--danger" id="delete-all-btn">
        Poista kaikki oma data
      </button>
    </div>

    <!-- Uloskirjautuminen -->
    <button class="btn btn--secondary" id="logout-btn">Kirjaudu ulos</button>
  </div>
</div>

<!-- Profiili-overlay -->
<div
  class="overlay-backdrop"
  id="profile-overlay"
  role="dialog"
  aria-modal="true"
  aria-labelledby="profile-title"
>
  <div class="overlay-panel">
    <div class="overlay__header">
      <h2 class="overlay__title" id="profile-title">Profiili</h2>
      <button
        class="overlay__close"
        id="close-profile"
        aria-label="Sulje profiili"
        title="Sulje"
      >
        ✕
      </button>
    </div>
    <div class="form-group">
      <label class="form-label" for="profile-name">Nimi</label>
      <input
        class="form-input"
        type="text"
        id="profile-name"
        placeholder="Etunimi"
      />
    </div>
    <div class="form-group">
      <label class="form-label" for="profile-height">Pituus (cm)</label>
      <input
        class="form-input"
        type="number"
        id="profile-height"
        min="100"
        max="250"
        placeholder="175"
      />
    </div>
    <div class="form-group">
      <label class="form-label" for="profile-weight">Paino (kg)</label>
      <input
        class="form-input"
        type="number"
        id="profile-weight"
        min="30"
        max="300"
        placeholder="70"
      />
    </div>
    <div class="form-group">
      <label class="form-label" for="profile-age">Ikä</label>
      <input
        class="form-input"
        type="number"
        id="profile-age"
        readonly
        style="opacity: 0.65; cursor: default"
        placeholder="30"
      />
    </div>
    <div class="form-group">
      <label class="form-label" for="profile-email-display">Sähköposti</label>
      <input
        class="form-input"
        type="email"
        id="profile-email-display"
        readonly
        style="opacity: 0.65; cursor: default"
      />
    </div>
    <p
      id="profile-message"
      aria-live="polite"
      style="font-size: 0.85rem; color: var(--color-primary); min-height: 1.2em"
    ></p>
    <button class="btn btn--primary" id="save-profile-btn">
      Tallenna muutokset
    </button>
  </div>
</div>

<!-- Globaali ilmoituspalkki -->
<div id="snackbar"></div>
